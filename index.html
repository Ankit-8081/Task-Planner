<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mission Control Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#27ae60">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #27ae60; 
            --secondary: #2ecc71;
            --primary-shadow: #219150;
            --overdue: #e74c3c;
            --bg-gradient: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            --glass: rgba(255, 255, 255, 0.95);
            --text: #2d3436; 
            --bg-main: #f0f2f5;
            --card-bg: #ffffff;
            --col-bg: #ebedef;
            --border: #dfe6e9;
            --cat-work: #0984e3; --cat-home: #6c5ce7; --cat-personal: #00b894; --cat-urgent: #d63031;
        }
        [data-theme="dark"] {
            --primary: #2ecc71; 
            --secondary: #55efc4;
            --primary-shadow: #1b9e53;
            --bg-gradient: linear-gradient(135deg, #1b9e53 0%, #2ecc71 100%);
            --bg-main: #121212;
            --card-bg: #1e1e1e;
            --text: #f5f6fa;
            --glass: rgba(30, 30, 30, 0.95);
            --col-bg: #252525;
            --border: #333333;
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg-main); 
            margin: 0; 
            color: var(--text); 
            overflow-x: hidden; 
            transition: background 0.3s, color 0.3s;
        }
        [data-theme="dark"] input::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
        
        input[type="date"], input[type="time"] {
            accent-color: var(--primary);
        }
        .top-nav {
            position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000;
        }
        .btn-header {
            padding: 8px 15px; border-radius: 12px; font-weight: 600; font-size: 12px;
            cursor: pointer; transition: 0.3s; border: 2px solid; text-transform: uppercase;
            background: var(--card-bg); color: var(--text); border-color: var(--border);
        }
        #install-btn { background: #2d3436; color: white; border-color: #2d3436; display: none; }
        
        .logout-btn { color: var(--overdue); border-color: var(--overdue); }
        .logout-btn:hover { background: var(--overdue); color: white; }
        #auth-screen { display: flex; height: 100vh; width: 100%; background: var(--bg-gradient); flex-direction: column; align-items: center; justify-content: center; }
        .auth-card { background: var(--glass); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); width: 340px; text-align: center; }
        .auth-input-container { position: relative; width: 100%; margin-bottom: 15px; }
        .auth-input { width: 100%; padding: 14px; padding-right: 70px; border-radius: 12px; border: 2px solid var(--border); background: var(--card-bg); color: var(--text); outline: none; box-sizing: border-box; }
        
        .pass-toggle-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--col-bg); border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; cursor: pointer; color: var(--text); }
        .btn-login { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; text-transform: uppercase; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: 0.8s; }
        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        #app-dashboard { display: none; padding: 20px; max-width: 1200px; margin: auto; padding-top: 80px; }
        
        .analytics-container { background: var(--card-bg); border-radius: 12px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; }
        .analytics-header { background: var(--primary); color: white; padding: 10px 20px; font-weight: 600; text-align: center; font-size: 18px; transition: background 0.3s; }
        .analytics-content { display: flex; padding: 25px; align-items: flex-end; gap: 30px; }
        
        .y-axis { display: flex; flex-direction: column; justify-content: space-between; height: 150px; padding-bottom: 25px; color: var(--text); opacity: 0.7; font-size: 11px; width: 30px; }
        .chart-area { flex-grow: 1; display: flex; justify-content: space-between; align-items: flex-end; height: 150px; border-bottom: 2px solid var(--border); padding: 0 10px; position: relative; }
        
        .bar-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; z-index: 1; max-width: 50px; }
        .bar-track { width: 30px; background: var(--col-bg); border-radius: 15px 15px 0 0; position: relative; height: 150px; overflow: hidden; }
        
        .bar-planned, .bar-done { 
            width: 100%; position: absolute; bottom: 0; border-radius: 12px 12px 0 0; height: 0; 
            transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .bar-planned { background: var(--primary); opacity: 0.15; }
        .bar-done { background: linear-gradient(to top, var(--primary), var(--secondary)); z-index: 2; }
        .day-label { font-size: 11px; font-weight: 600; margin-top: 10px; color: var(--text); }
        .progress-container { position: relative; width: 100px; height: 100px; }
        .progress-ring { transform: rotate(-90deg); }
        .progress-ring-bg { stroke: var(--col-bg); }
        #progressCircle { stroke: var(--primary); transition: stroke-dashoffset 0.8s ease-in-out, stroke 0.3s; }
        .pct-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 22px; font-weight: 600; }
        .view-toggle { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .view-btn { padding: 8px 25px; border-radius: 20px; border: 2px solid var(--primary); background: transparent; color: var(--primary); cursor: pointer; font-weight: 600; transition: 0.3s; }
        .view-btn.active { background: var(--primary); color: white; }
        .category-bar { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding: 5px; }
        .cat-tab { padding: 8px 18px; border-radius: 12px; background: var(--card-bg); color: var(--text); border: 1px solid var(--border); cursor: pointer; font-weight: 600; font-size: 12px; white-space: nowrap; transition: 0.3s; }
        .cat-tab.active { background: #34495e !important; color: white !important; }
        .input-bar { 
            background: var(--card-bg); padding: 20px; border-radius: 20px; 
            display: grid; grid-template-columns: 2fr 1.2fr 1.1fr 1fr auto; 
            gap: 12px; margin-bottom: 25px; border-bottom: 4px solid var(--primary); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: border-bottom 0.3s;
        }
        
        .input-bar input, .input-bar select {
            padding: 12px; border: 1px solid var(--border); border-radius: 10px; outline: none; font-family: inherit; background: var(--card-bg); color: var(--text);
        }
        .input-bar button { 
            background: var(--primary); color: white; border: none; padding: 0 30px; 
            border-radius: 12px; font-weight: 600; letter-spacing: 1px; cursor: pointer; 
            transition: all 0.2s ease; box-shadow: 0 4px 0 var(--primary-shadow); 
        }
        .board { display: grid; grid-template-columns: 1fr 1fr 1.4fr; gap: 20px; }
        .col { background: var(--col-bg); padding: 18px; border-radius: 24px; min-height: 400px; transition: background 0.3s; }
        
        ul { list-style: none; padding: 0; margin: 0; width: 100%; }
        li { 
            background: var(--card-bg); color: var(--text); padding: 15px; border-radius: 12px; margin-bottom: 12px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-left: 6px solid var(--primary); box-sizing: border-box; width: 100%; 
            transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .btn-icon { background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px; border-radius: 8px; color: var(--text); opacity: 0.8; }
        .btn-icon:hover { background: var(--col-bg); opacity: 1; }
        
        /* Edit Modal Styles */
        .edit-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2001;
            align-items: center;
            justify-content: center;
        }
        .edit-modal-overlay.show {
            display: flex;
        }
        .edit-modal {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .edit-modal h2 {
            margin-top: 0;
            color: var(--text);
            font-size: 24px;
            margin-bottom: 20px;
        }
        .edit-form-group {
            margin-bottom: 15px;
        }
        .edit-form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--text);
        }
        .edit-form-group input,
        .edit-form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text);
            box-sizing: border-box;
        }
        .edit-modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .edit-modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-save {
            background: var(--primary);
            color: white;
        }
        .btn-save:hover {
            background: var(--primary-shadow);
        }
        .btn-cancel {
            background: var(--col-bg);
            color: var(--text);
        }
        .btn-cancel:hover {
            background: var(--border);
        }
        @media (max-width: 768px) {
            .input-bar { grid-template-columns: 1fr; }
            .board { grid-template-columns: 1fr; }
        }
    </style>
    <style>
        .calendar-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .calendar-modal-overlay.show {
            display: flex;
        }
        .calendar-modal {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }
        .modal-close {
            background: var(--col-bg);
            border: none;
            font-size: 24px;
            cursor: pointer;
            border-radius: 8px;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }
        .completed-group {
            margin-bottom: 25px;
        }
        .completed-date-header {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .calendar-icon-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-left: 10px;
            transition: 0.3s;
            font-size: 14px;
        }
        .calendar-icon-btn:hover {
            background: var(--primary-shadow);
            transform: translateY(-2px);
        }
        @media (max-width: 768px) {
            .calendar-modal {
                padding: 20px;
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div id="splash-screen"><h2>MISSION CONTROL PRO</h2></div>
    <div id="app-dashboard">
        <div class="top-nav">
            <button id="theme-toggle" class="btn-header" onclick="toggleTheme()">🌙 Dark</button>
            <button id="install-btn" class="btn-header">Install App</button>
            <button class="logout-btn btn-header" onclick="logout()">Sign Out</button>
        </div>
        <div class="analytics-container">
            <div id="status-header" class="analytics-header">Weekly Fuel Levels</div>
            <div class="analytics-content">
                <div class="y-axis"><span id="y-max">8</span><span>6</span><span>4</span><span>2</span><span>0</span></div>
                <div class="chart-area" id="weeklyChart"></div>
                <div class="side-meter">
                    <div class="progress-container">
                        <svg class="progress-ring" width="100" height="100">
                            <circle class="progress-ring-bg" stroke-width="10" fill="transparent" r="42" cx="50" cy="50"/>
                            <circle id="progressCircle" stroke-width="10" fill="transparent" r="42" cx="50" cy="50" style="stroke-dasharray: 264; stroke-dashoffset: 264;"/>
                        </svg>
                        <div id="pctLabel" class="pct-label">0%</div>
                    </div>                </div>
            </div>
        </div>
        <div class="view-toggle">
            <button id="view-active" class="view-btn active" onclick="setView('active', event)">ACTIVE</button>
            <button id="view-completed" class="view-btn" onclick="setView('completed', event)">COMPLETED</button>
        </div>
        <div class="category-bar">
            <button class="cat-tab active" onclick="setCategory('all', event)">ALL</button>
            <button class="cat-tab" onclick="setCategory('work', event)">WORK</button>
            <button class="cat-tab" onclick="setCategory('home', event)">HOME</button>
            <button class="cat-tab" onclick="setCategory('personal', event)">PERSONAL</button>
            <button class="cat-tab" onclick="setCategory('urgent', event)">URGENT</button>
        </div>
        <div class="input-bar">
            <input type="text" id="taskName" placeholder="Mission Name...">
            <select id="taskCat"><option value="work">Work</option><option value="home">Home</option><option value="personal">Personal</option><option value="urgent">Urgent</option></select>
            <input type="date" id="taskDate">
            <input type="time" id="taskTime">
            <button onclick="addTask()">DEPLOY</button>
        </div>
        <div class="board">
            <div class="col"><h3>PREVIOUS</h3><ul id="list-prev"></ul></div>
            <div class="col">
                <h3 style="display: inline-block;">IN PROGRESS</h3>
                <button class="calendar-icon-btn" onclick="showCompletedHistory()" title="View Completed History">
                    📅 History
                </button>
                <ul id="list-today"></ul>
            </div>
            <div class="col"><h3>UPCOMING</h3><ul id="up-cont"></ul></div>
        </div>
    </div>

    <!-- Completed History Modal -->
    <div class="calendar-modal-overlay" id="completedModal" onclick="closeModalOnOverlay(event)">
        <div class="calendar-modal">
            <div class="modal-header">
                <h3 style="margin: 0;">Completed Tasks History</h3>
                <button class="modal-close" onclick="closeCompletedModal()">×</button>
            </div>
            <div id="completedHistoryContent"></div>
        </div>
    </div>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 id="auth-title">Login</h2>
            <div class="auth-input-container"><input type="text" id="username" class="auth-input" placeholder="Username"></div>
            <div class="auth-input-container">
                <input type="password" id="password" class="auth-input" placeholder="Password">
                <button type="button" class="pass-toggle-btn" id="togglePassBtn" onclick="togglePassword()">Show</button>
            </div>
            <button id="authBtn" class="btn-login" onclick="handleAuth()">LOGIN</button>
            <p id="auth-error" style="color:var(--overdue); margin-top:10px; font-size:12px;"></p>
            <p id="toggle-text" style="font-size:12px; margin-top:15px; color:#2d3436;">New user? <span onclick="toggleAuthMode()" style="color:var(--primary); cursor:pointer; font-weight: 600;">Sign Up</span></p>
        </div>
    </div>
    <!-- Edit Task Modal -->
    <div id="editModal" class="edit-modal-overlay" onclick="closeEditModalOnOverlay(event)">
        <div class="edit-modal">
            <h2>✏️ Edit Task</h2>
            <div class="edit-form-group">
                <label>Task Name</label>
                <input type="text" id="editTaskName">
            </div>
            <div class="edit-form-group">
                <label>Date</label>
                <input type="date" id="editTaskDate">
            </div>
            <div class="edit-form-group">
                <label>Time</label>
                <input type="time" id="editTaskTime">
            </div>
            <div class="edit-form-group">
                <label>Category</label>
                <select id="editTaskCategory">
                    <option value="work">💼 Work</option>
                    <option value="home">🏠 Home</option>
                    <option value="personal">✨ Personal</option>
                    <option value="urgent">🔥 Urgent</option>
                </select>
            </div>
            <div class="edit-modal-buttons">
                <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                <button class="btn-save" onclick="saveEditTask()">Save Changes</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA-mhIz79hzRvTbVZKeDPEfv2uv5jh-iSA",
        authDomain: "task-list-tracker-e80d4.firebaseapp.com",
        databaseURL: "https://task-list-tracker-e80d4-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "task-list-tracker-e80d4",
        appId: "1:918246411240:web:3f448eb1d0a6fc3f4fb25d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null, allTasks = [], currentCategory = 'all', currentView = 'active', isLoginMode = true;
    const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    // =====================================================================
    // OFFLINE LAYER — IndexedDB store + sync queue.
    // Nothing here touches the DOM or changes any rendering behaviour.
    // =====================================================================
    const DB_NAME      = 'mc-offline';
    const DB_VER       = 1;
    const STORE_TASKS  = 'tasks';
    const STORE_QUEUE  = 'syncQueue';
    let idb = null;

    function idbOpen() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, DB_VER);
            req.onupgradeneeded = (e) => {
                const d = e.target.result;
                if (!d.objectStoreNames.contains(STORE_TASKS))
                    d.createObjectStore(STORE_TASKS, { keyPath: 'id' });
                if (!d.objectStoreNames.contains(STORE_QUEUE))
                    d.createObjectStore(STORE_QUEUE, { keyPath: 'qid', autoIncrement: true });
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror   = () => reject(req.error);
        });
    }

    // Generic helper — runs a callback against an object store, returns a promise
    function idbRun(storeName, mode, fn) {
        return new Promise((resolve, reject) => {
            const tx    = idb.transaction([storeName], mode);
            const store = tx.objectStore(storeName);
            const req   = fn(store);
            req.onsuccess = () => resolve(req.result);
            req.onerror   = () => reject(req.error);
        });
    }

    // Task store
    const localGetAll  = ()     => idbRun(STORE_TASKS, 'readonly',  s => s.getAll());
    const localPut     = (task) => idbRun(STORE_TASKS, 'readwrite', s => s.put(task));
    const localDelete  = (id)   => idbRun(STORE_TASKS, 'readwrite', s => s.delete(id));

    // Sync queue
    const queuePush      = (op)  => idbRun(STORE_QUEUE, 'readwrite', s => s.add(op));
    const queueGetAll    = ()    => idbRun(STORE_QUEUE, 'readonly',  s => s.getAll());
    const queueDeleteOne = (qid) => idbRun(STORE_QUEUE, 'readwrite', s => s.delete(qid));
    // =====================================================================

    // Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(() => console.log('SW Registered'));
        });
    }

    // =====================================================================
    // CONNECTION STATE + SYNC QUEUE PROCESSOR
    // =====================================================================
    let isOnline    = navigator.onLine;
    let syncRunning = false;

    // Firebase's own connectivity signal
    onValue(ref(db, ".info/connected"), (snap) => {
        const wasOffline = !isOnline;
        isOnline = !!snap.val();

        const header = document.getElementById('status-header');
        if (isOnline) {
            header.style.background = "var(--primary)";
            header.innerText = "Weekly Fuel Levels";
            if (wasOffline) processSyncQueue();
        } else {
            header.style.background = "#e67e22";
            header.innerText = "Weekly Fuel Levels (Sync Pending...)";
        }
    });

    // Fallback for airplane-mode style disconnects
    window.addEventListener('online',  () => { isOnline = true;  processSyncQueue(); });
    window.addEventListener('offline', () => { isOnline = false; });

    // Replays every queued op in order. Each entry is removed only after it
    // succeeds on Firebase; on failure we stop and wait for the next attempt.
    async function processSyncQueue() {
        if (syncRunning || !isOnline || !currentUser) return;
        syncRunning = true;
        try {
            const queue = await queueGetAll();
            for (const item of queue) {
                const path = `users/${currentUser.uid}/tasks/${item.taskId}`;
                try {
                    switch (item.type) {
                        case 'set':    await set(ref(db, path), item.data);       break;
                        case 'update': await update(ref(db, path), item.updates); break;
                        case 'remove': await remove(ref(db, path));               break;
                    }
                    await queueDeleteOne(item.qid); // confirmed → remove
                } catch (e) {
                    console.warn('Sync failed for qid', item.qid, e);
                    break; // leave remaining items; retry next time
                }
            }
        } catch (e) { console.error('processSyncQueue', e); }
        syncRunning = false;
    }

    // =====================================================================
    // THEME
    // =====================================================================
    window.toggleTheme = () => {
        const current = document.documentElement.getAttribute('data-theme');
        const target  = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', target);
        localStorage.setItem('mission-theme', target);
        document.getElementById('theme-toggle').innerText = target === 'dark' ? '☀️ Light' : '🌙 Dark';
    };
    const savedTheme = localStorage.getItem('mission-theme');
    if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('theme-toggle').innerText = savedTheme === 'dark' ? '☀️ Light' : '🌙 Dark';
        });
    }

    // =====================================================================
    // PWA INSTALL
    // =====================================================================
    let deferredPrompt;
    const installBtn = document.getElementById('install-btn');
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';
    });
    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') installBtn.style.display = 'none';
            deferredPrompt = null;
        }
    });

    // =====================================================================
    // CHART
    // =====================================================================
    const initChart = () => {
        const chart = document.getElementById('weeklyChart');
        chart.innerHTML = days.map((day, i) => `
            <div class="bar-wrapper">
                <div class="bar-track">
                    <div id="planned-${i}" class="bar-planned"></div>
                    <div id="done-${i}" class="bar-done"></div>
                </div>
                <div class="day-label">${day}</div>
            </div>`).join('');
    };
    initChart();

    const getTodayStr = () => new Date().toLocaleDateString('en-CA');
    document.getElementById('taskDate').min = getTodayStr();

    // =====================================================================
    // AUTH STATE CHANGE
    // =====================================================================
    onAuthStateChanged(auth, async (user) => {
        document.getElementById('splash-screen').classList.add('hidden');
        if (user) {
            currentUser = user;
            document.getElementById('auth-screen').style.display  = 'none';
            document.getElementById('app-dashboard').style.display = 'block';

            if (!idb) idb = await idbOpen();

            // Paint from local cache instantly (works fully offline)
            allTasks = await localGetAll();
            renderUI();

            // Start the Firebase live listener (merges server state)
            loadData();

            // Flush any writes that were queued while offline
            if (isOnline) processSyncQueue();
        } else {
            currentUser = null;
            document.getElementById('auth-screen').style.display  = 'flex';
            document.getElementById('app-dashboard').style.display = 'none';
        }
    });

    // =====================================================================
    // AUTH HELPERS
    // =====================================================================
    window.togglePassword = () => {
        const p = document.getElementById('password'), b = document.getElementById('togglePassBtn');
        p.type = p.type === 'password' ? 'text' : 'password';
        b.innerText = p.type === 'password' ? 'Show' : 'Hide';
    };
    window.handleAuth = async () => {
        const u = document.getElementById('username').value, p = document.getElementById('password').value;
        const email = `${u}@missioncontrol.com`;
        try {
            if (isLoginMode) await signInWithEmailAndPassword(auth, email, p);
            else             await createUserWithEmailAndPassword(auth, email, p);
        } catch (e) { document.getElementById('auth-error').innerText = e.message; }
    };
    window.toggleAuthMode = () => {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "Login" : "Sign Up";
        document.getElementById('authBtn').innerText     = isLoginMode ? "LOGIN" : "SIGN UP";
        document.getElementById('toggle-text').innerHTML = isLoginMode
            ? `New user? <span onclick="toggleAuthMode()" style="color:var(--primary); cursor:pointer; font-weight: 600;">Sign Up</span>`
            : `Already have an account? <span onclick="toggleAuthMode()" style="color:var(--primary); cursor:pointer; font-weight: 600;">Login</span>`;
    };
    window.logout = () => signOut(auth);

    // =====================================================================
    // VIEW / CATEGORY
    // =====================================================================
    window.setView = (view, event) => {
        currentView = view;
        document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderUI();
    };
    window.setCategory = (cat, event) => {
        currentCategory = cat;
        document.querySelectorAll('.cat-tab').forEach(tab => tab.classList.remove('active'));
        event.target.classList.add('active');
        renderUI();
    };

    // =====================================================================
    // FIREBASE LISTENER — keeps IndexedDB in sync with the server.
    // On every snapshot we write the server's tasks into the local store.
    // Any local task whose id doesn't exist on the server yet (still queued)
    // is preserved so it isn't lost before its write completes.
    // =====================================================================
    function loadData() {
        onValue(ref(db, `users/${currentUser.uid}/tasks`), async (snap) => {
            const data        = snap.val();
            const serverTasks = data ? Object.keys(data).map(k => ({ id: k, ...data[k] })) : [];
            const serverIds   = new Set(serverTasks.map(t => t.id));

            // Keep any local task not yet confirmed on the server
            const pendingLocal = (await localGetAll()).filter(t => !serverIds.has(t.id));

            // Rewrite the tasks store in one transaction
            await new Promise((res, rej) => {
                const tx = idb.transaction([STORE_TASKS], 'readwrite');
                const s  = tx.objectStore(STORE_TASKS);
                s.clear();
                tx.oncomplete = res;
                tx.onerror    = () => rej(tx.error);
            });
            for (const t of [...serverTasks, ...pendingLocal]) await localPut(t);

            allTasks = await localGetAll();
            renderUI();
        });
    }

    // =====================================================================
    // TASK MUTATIONS — local-first, then Firebase (or queue if offline).
    // =====================================================================
    window.addTask = async () => {
        const n = document.getElementById('taskName').value;
        const d = document.getElementById('taskDate').value;
        const c = document.getElementById('taskCat').value;
        if (!n || !d) return alert("Required fields missing.");

        const id   = Date.now().toString();
        const task = { id, name: n, cat: c, date: d, completed: false, archived: false };

        // Local first
        await localPut(task);
        allTasks.push(task);
        renderUI();

        // Firebase or queue
        const payload = { name: n, cat: c, date: d, completed: false, archived: false };
        if (isOnline) {
            try { await set(ref(db, `users/${currentUser.uid}/tasks/${id}`), payload); }
            catch (e) { await queuePush({ type: 'set', taskId: id, data: payload }); }
        } else {
            await queuePush({ type: 'set', taskId: id, data: payload });
        }

        document.getElementById('taskName').value = '';
        document.getElementById('taskName').focus();
    };

    window.toggleTask = async (id, cur) => {
        const next = !cur;
        const task = allTasks.find(t => t.id === id);
        if (task) {
            task.completed = next;
            // Auto-archive when completed and add completion timestamp
            if (next) {
                task.archived = true;
                task.completedAt = new Date().toISOString();
            } else {
                // Unarchive when unticked (revert to active)
                task.archived = false;
                task.completedAt = null;
            }
        }
        await localPut({ ...task });
        renderUI();

        const updates = { completed: next };
        if (next) {
            updates.archived = true;
            updates.completedAt = new Date().toISOString();
        } else {
            updates.archived = false;
            updates.completedAt = null;
        }

        if (isOnline) {
            try { await update(ref(db, `users/${currentUser.uid}/tasks/${id}`), updates); }
            catch (e) { await queuePush({ type: 'update', taskId: id, updates }); }
        } else {
            await queuePush({ type: 'update', taskId: id, updates });
        }
    };

    window.archiveTask = async (id, cur) => {
        const next = !cur;
        const task = allTasks.find(t => t.id === id);
        if (task) task.archived = next;
        await localPut({ ...task });
        renderUI();

        if (isOnline) {
            try { await update(ref(db, `users/${currentUser.uid}/tasks/${id}`), { archived: next }); }
            catch (e) { await queuePush({ type: 'update', taskId: id, updates: { archived: next } }); }
        } else {
            await queuePush({ type: 'update', taskId: id, updates: { archived: next } });
        }
    };

    window.deleteTask = async (id) => {
        allTasks = allTasks.filter(t => t.id !== id);
        await localDelete(id);
        renderUI();

        if (isOnline) {
            try { await remove(ref(db, `users/${currentUser.uid}/tasks/${id}`)); }
            catch (e) { await queuePush({ type: 'remove', taskId: id }); }
        } else {
            await queuePush({ type: 'remove', taskId: id });
        }
    };
    // =====================================================================
    // EDIT TASK FUNCTIONS
    // =====================================================================
    let currentEditTaskId = null;

    window.editTask = function(id) {
        const task = allTasks.find(t => t.id === id);
        if (!task) return;
        
        currentEditTaskId = id;
        document.getElementById("editTaskName").value = task.name;
        document.getElementById("editTaskDate").value = task.date;
        document.getElementById("editTaskTime").value = task.time || "";
        document.getElementById("editTaskCategory").value = task.cat;
        
        document.getElementById("editModal").classList.add("show");
    };

    window.closeEditModal = function() {
        document.getElementById("editModal").classList.remove("show");
        currentEditTaskId = null;
    };

    window.saveEditTask = async function() {
        if (!currentEditTaskId) return;
        
        const task = allTasks.find(t => t.id === currentEditTaskId);
        if (!task) return;
        
        const newName = document.getElementById("editTaskName").value.trim();
        const newDate = document.getElementById("editTaskDate").value;
        const newTime = document.getElementById("editTaskTime").value;
        const newCat = document.getElementById("editTaskCategory").value;
        
        if (!newName || !newDate) {
            alert("⚠️ Name & Date required!");
            return;
        }
        
        task.name = newName;
        task.date = newDate;
        task.time = newTime;
        task.cat = newCat;
        
        await localPut({ ...task });
        renderUI();
        
        const updates = { name: newName, date: newDate, time: newTime, cat: newCat };
        if (isOnline) {
            try { await update(ref(db, `users/${currentUser.uid}/tasks/${currentEditTaskId}`), updates); }
            catch (e) { await queuePush({ type: "update", taskId: currentEditTaskId, data: updates }); }
        } else {
            await queuePush({ type: "update", taskId: currentEditTaskId, data: updates });
        }
        
        closeEditModal();
    };

    window.closeEditModalOnOverlay = function(event) {
        if (event.target.id === "editModal") {
            closeEditModal();
        }
    };


    // =====================================================================
    // RENDER  (identical logic to original; two broken getElementById calls fixed)
    // =====================================================================
    function renderUI() {
        const todayStr = getTodayStr();
        const sun = new Date(); sun.setDate(sun.getDate() - sun.getDay());
        const sunStr = sun.toLocaleDateString('en-CA');

        const prev = document.getElementById('list-prev'),
              now  = document.getElementById('list-today'),
              up   = document.getElementById('up-cont');
        prev.innerHTML = now.innerHTML = up.innerHTML = '';

        let filtered = allTasks.filter(t => currentView === 'completed' ? t.completed : !t.completed);
        if (currentCategory !== 'all') filtered = filtered.filter(t => t.cat === currentCategory);

        const stats = [0,0,0,0,0,0,0], doneStats = [0,0,0,0,0,0,0];

        // Calculate stats from ALL tasks (not just filtered) for accurate bar graph and completion meter
        let allTasksForStats = allTasks;
        if (currentCategory !== 'all') allTasksForStats = allTasksForStats.filter(t => t.cat === currentCategory);

        allTasksForStats.forEach(t => {
            const tDate = new Date(t.date + 'T00:00:00');
            const diff  = Math.round((tDate - new Date(sunStr + 'T00:00:00')) / 86400000);
            if (diff >= 0 && diff < 7) { 
                stats[diff]++; 
                if (t.completed) doneStats[diff]++;
            }
        });

        // Render only the filtered tasks in the columns
        filtered.forEach(t => {
            const li = document.createElement('li');
            li.style.borderLeftColor = `var(--cat-${t.cat})`;
            li.innerHTML = `<div><input type="checkbox" ${t.completed?'checked':''} onchange="toggleTask('${t.id}',${t.completed})">
                <span style="${t.completed ? 'text-decoration: line-through; opacity: 0.5;' : ''}">${t.name}</span></div>
                <div><button class="btn-icon" onclick="editTask('${t.id}')" title="Edit">✏️</button><button class="btn-icon" onclick="deleteTask('${t.id}')" title="Delete">🗑️</button></div>`;

            // For IN PROGRESS column (now), only show today's completed tasks
            if (t.date === todayStr) {
                // Show all non-completed tasks
                if (!t.completed) {
                    now.appendChild(li);
                } else {
                    // Only show completed tasks that were completed today
                    const completedToday = t.completedAt && 
                        new Date(t.completedAt).toLocaleDateString('en-CA') === todayStr;
                    if (completedToday) {
                        now.appendChild(li);
                    }
                }
            } else if (t.date < todayStr) {
                prev.appendChild(li);
            } else {
                up.appendChild(li);
            }
        });

        const max = Math.max(...stats, 8);
        document.getElementById('y-max').innerText = max;

        days.forEach((_, i) => {
            const pBar = document.getElementById(`planned-${i}`);
            const dBar = document.getElementById(`done-${i}`);
            if (pBar) pBar.style.height = `${(stats[i]/max)*100}%`;
            if (dBar) dBar.style.height = `${(doneStats[i]/max)*100}%`;
        });

        // Calculate completion percentage from ALL tasks (not just filtered) for accurate completion meter
        const total = allTasksForStats.length, done = allTasksForStats.filter(t => t.completed).length;
        const pct   = total ? (done/total)*100 : 0;
        document.getElementById('progressCircle').style.strokeDashoffset = 264 - (pct/100*264);
        document.getElementById('pctLabel').innerText = Math.round(pct) + "%";
    }

    // =====================================================================
    // COMPLETED HISTORY MODAL
    // =====================================================================
    window.showCompletedHistory = function() {
        const modal = document.getElementById('completedModal');
        const content = document.getElementById('completedHistoryContent');
        
        // Get all completed tasks
        const completedTasks = allTasks.filter(t => t.completed && t.completedAt);
        
        if (completedTasks.length === 0) {
            content.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 40px;">No completed tasks yet.</p>';
            modal.classList.add('show');
            return;
        }
        
        // Group by completion date
        const groupedByDate = {};
        completedTasks.forEach(task => {
            const completedDate = new Date(task.completedAt).toLocaleDateString('en-CA');
            if (!groupedByDate[completedDate]) {
                groupedByDate[completedDate] = [];
            }
            groupedByDate[completedDate].push(task);
        });
        
        // Sort dates in descending order
        const sortedDates = Object.keys(groupedByDate).sort((a, b) => b.localeCompare(a));
        
        // Build HTML
        let html = '';
        sortedDates.forEach(date => {
            const dateObj = new Date(date + 'T00:00:00');
            const formattedDate = dateObj.toLocaleDateString('en-US', { 
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            
            const isToday = date === getTodayStr();
            const dateLabel = isToday ? `Today - ${formattedDate}` : formattedDate;
            
            html += `<div class="completed-group">`;
            html += `<div class="completed-date-header">${dateLabel}</div>`;
            html += `<ul style="list-style: none; padding: 0;">`;
            
            groupedByDate[date].forEach(task => {
                const completedTime = new Date(task.completedAt).toLocaleTimeString('en-US', {
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true
                });
                
                html += `<li style="background: var(--card-bg); color: var(--text); padding: 12px 15px; 
                         border-radius: 10px; margin-bottom: 8px; display: flex; 
                         justify-content: space-between; align-items: center; 
                         border-left: 4px solid var(--cat-${task.cat});">
                    <div>
                        <span style="text-decoration: line-through; opacity: 0.7;">${task.name}</span>
                        <div style="font-size: 11px; color: var(--text-secondary); margin-top: 4px;">
                            Completed at ${completedTime}
                        </div>
                    </div>
                    <button class="btn-icon" onclick="editTask('${task.id}')" title="Edit">✏️</button><button class="btn-icon" onclick="deleteTask('${task.id}')" title="Delete">🗑️</button>
                </li>`;
            });
            
            html += `</ul></div>`;
        });
        
        content.innerHTML = html;
        modal.classList.add('show');
    };
    
    window.closeCompletedModal = function() {
        document.getElementById('completedModal').classList.remove('show');
    };
    
    window.closeModalOnOverlay = function(event) {
        if (event.target.id === 'completedModal') {
            closeCompletedModal();
        }
    };
</script>
</body>
</html>
